<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snack'Trad by Rayane</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #C0392B;
      --yellow: #D4A017;
      --white:  #FFFDF7;
      --dark:   #1A1008;
      --card-w: 420px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      padding: 20px 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(212,160,23,.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(192,57,43,.10) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(var(--card-w), 94vw);
      background: var(--white);
      border-radius: 28px;
      box-shadow:
        0 4px 32px rgba(192,57,43,.13),
        0 1px 4px rgba(0,0,0,.06);
      overflow: hidden;
      animation: rise .7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { opacity:0; transform: translateY(32px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── hero ── */
    .hero {
      position: relative;
      background: var(--red);
      padding: 40px 32px 52px;
      text-align: center;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: var(--yellow);
      border-radius: 50%;
      opacity: .15;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 140%; height: 120px;
      background: var(--white);
      border-radius: 50%;
    }

    .logo-wrap {
      position: relative;
      z-index: 2;
      display: inline-block;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 4px solid rgba(212,160,23,.5);
      box-shadow: 0 8px 32px rgba(0,0,0,.3), 0 0 0 2px rgba(255,255,255,.15);
      overflow: hidden;
      background: #fff;
      margin-bottom: 16px;
      animation: pop .6s .2s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes pop {
      from { opacity:0; transform: scale(.5); }
      to   { opacity:1; transform: scale(1); }
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tagline {
      position: relative;
      z-index: 2;
      margin-top: 4px;
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,.70);
    }

    /* ── body ── */
    .body {
      padding: 44px 28px 32px;
    }

    /* location pill */
    .location {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #FFF8E6;
      border: 1.5px solid var(--yellow);
      border-radius: 100px;
      padding: 8px 18px;
      width: fit-content;
      margin: 0 auto 28px;
      font-size: .82rem;
      font-weight: 500;
      color: #7A5700;
      animation: rise .7s .15s both;
      cursor: pointer;
      text-decoration: none;
      transition: background .18s, box-shadow .18s;
    }

    .location:hover {
      background: #FFF1CC;
      box-shadow: 0 4px 12px rgba(212,160,23,.25);
    }

    /* ── menu button ── */
    .menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      background: var(--red);
      color: #fff;
      border-radius: 16px;
      text-decoration: none;
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: .5px;
      margin-bottom: 20px;
      transition: transform .18s ease, box-shadow .18s ease, background .18s;
      animation: rise .6s .13s both;
    }

    .menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(192,57,43,.35);
      background: #a93226;
    }

    .menu-btn:active { transform: translateY(0); }

    .menu-icon {
      width: 22px; height: 22px;
      display: flex; flex-direction: column;
      justify-content: center; gap: 4px;
    }

    .menu-icon span {
      display: block;
      height: 2.5px;
      background: rgba(255,255,255,.9);
      border-radius: 2px;
    }

    /* ── contacts ── */
    .contacts {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 16px;
      text-decoration: none;
      font-size: .88rem;
      font-weight: 500;
      color: var(--dark);
      background: #F7F3EC;
      border: 1.5px solid transparent;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
      animation: rise .6s both;
    }

    .contact-btn:nth-child(1) { animation-delay: .18s; }
    .contact-btn:nth-child(2) { animation-delay: .24s; }
    .contact-btn:nth-child(3) { animation-delay: .30s; }
    .contact-btn:nth-child(4) { animation-delay: .36s; }

    .contact-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,.10);
      border-color: var(--yellow);
      background: #FFFDF0;
    }

    .contact-btn:active { transform: translateY(0); }

    .icon-circle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px; height: 42px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .btn-label { flex: 1; }
    .btn-label strong { display: block; font-weight: 600; font-size: .88rem; }
    .btn-label span   { font-size: .75rem; color: #999; font-weight: 400; }

    .btn-arrow { color: #CCC; font-size: 1.1rem; transition: color .18s; }
    .contact-btn:hover .btn-arrow { color: var(--red); }

    .ic-phone     { background: #FFF4D6; }
    .ic-instagram { background: #FDE8F6; }
    .ic-facebook  { background: #E8EFFE; }
    .ic-tiktok    { background: #E8F8F8; }

    /* divider */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 24px 0 16px;
      color: #CCC; font-size: .72rem;
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #EEE;
    }

    .footer {
      text-align: center; font-size: .72rem;
      color: #BBB; letter-spacing: .5px;
    }
  </style>
</head>
